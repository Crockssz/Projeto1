<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Shapes & Geometry</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0d0d0d;
      --accent: #e8ff47;
      --text: #f0f0f0;
      --muted: #444;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      padding: 3rem;
    }

    nav {
      margin-bottom: 3rem;
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }

    nav a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      transition: color 0.2s;
    }

    nav a:hover { color: var(--accent); }

    nav .sep { color: var(--muted); font-size: 0.7rem; }

    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3rem, 7vw, 6rem);
      letter-spacing: 0.04em;
      line-height: 0.95;
      margin-bottom: 0.4rem;
    }

    h1 em {
      color: var(--accent);
      font-style: normal;
    }

    .subtitle {
      font-size: 0.8rem;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 4rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      grid-template-rows: auto;
      gap: 12px;
    }

    .rect {
      border-radius: 3px;
      position: relative;
      overflow: hidden;
      cursor: default;
      transition: transform 0.4s cubic-bezier(0.16,1,0.3,1), box-shadow 0.4s;
    }

    .rect:hover {
      transform: translateY(-4px) scale(1.01);
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      z-index: 2;
    }

    .rect-label {
      position: absolute;
      bottom: 1rem;
      left: 1rem;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      opacity: 0.5;
      font-family: 'DM Sans', sans-serif;
    }

    /* individual rect styles & grid placements */
    .r1 {
      grid-column: 1 / 6;
      height: 220px;
      background: linear-gradient(135deg, #1a1a1a 0%, #252510 100%);
      border: 1px solid #2a2a1a;
    }

    .r2 {
      grid-column: 6 / 13;
      height: 220px;
      background: var(--accent);
    }
    .r2 .rect-label { color: #0a0a0a; opacity: 0.4; }

    .r3 {
      grid-column: 1 / 4;
      height: 160px;
      background: #1a1a1a;
      border: 1px solid #252525;
    }

    .r4 {
      grid-column: 4 / 8;
      height: 160px;
      background: linear-gradient(160deg, #1f1f1f, #141414);
      border: 1px solid #232323;
    }

    .r5 {
      grid-column: 8 / 13;
      height: 160px;
      background: #c8e820;
    }
    .r5 .rect-label { color: #0a0a0a; opacity: 0.4; }

    .r6 {
      grid-column: 1 / 7;
      height: 130px;
      border: 1px solid var(--accent);
      background: transparent;
    }

    .r7 {
      grid-column: 7 / 10;
      height: 130px;
      background: #1c1c0e;
      border: 1px solid #2d2d12;
    }

    .r8 {
      grid-column: 10 / 13;
      height: 130px;
      background: #e8ff47;
      clip-path: polygon(0 0, 100% 0, 100% 70%, 70% 100%, 0 100%);
    }
    .r8 .rect-label { color: #0a0a0a; opacity: 0.4; }

    .r9 {
      grid-column: 1 / 3;
      height: 100px;
      background: var(--accent);
    }
    .r9 .rect-label { color: #0a0a0a; opacity: 0.4; }

    .r10 {
      grid-column: 3 / 9;
      height: 100px;
      background: #111;
      border: 1px solid #222;
    }

    .r11 {
      grid-column: 9 / 13;
      height: 100px;
      background: #1a1a0a;
      border: 1px solid #2a2a10;
    }

    /* inner decorative shapes */
    .r1::after {
      content: '';
      position: absolute;
      top: 20px; right: 20px;
      width: 60px; height: 60px;
      border: 1px solid rgba(232,255,71,0.2);
    }
    .r1::before {
      content: '';
      position: absolute;
      top: 35px; right: 35px;
      width: 30px; height: 30px;
      background: rgba(232,255,71,0.06);
    }

    .r4::after {
      content: '';
      position: absolute;
      left: 50%; top: 50%;
      transform: translate(-50%,-50%) rotate(45deg);
      width: 50px; height: 50px;
      border: 1px solid rgba(255,255,255,0.07);
    }

    .r6::after {
      content: '';
      position: absolute;
      left: 1.2rem; top: 50%;
      transform: translateY(-50%);
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.8rem;
      color: var(--accent);
      letter-spacing: 0.08em;
    }

    .r10::before {
      content: '';
      position: absolute;
      left: 1.5rem; top: 50%;
      transform: translateY(-50%);
      width: 120px; height: 1px;
      background: linear-gradient(to right, rgba(232,255,71,0.4), transparent);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .rect { animation: fadeIn 0.6s cubic-bezier(0.16,1,0.3,1) both; }
    .r1 { animation-delay: 0.05s; }
    .r2 { animation-delay: 0.1s; }
    .r3 { animation-delay: 0.15s; }
    .r4 { animation-delay: 0.2s; }
    .r5 { animation-delay: 0.25s; }
    .r6 { animation-delay: 0.3s; }
    .r7 { animation-delay: 0.35s; }
    .r8 { animation-delay: 0.4s; }
    .r9 { animation-delay: 0.45s; }
    .r10 { animation-delay: 0.5s; }
    .r11 { animation-delay: 0.55s; }
  </style>
</head>
<body>

  <nav>
    <a href="../index.html">← Portal</a>
    <span class="sep">/</span>
    <a href="#">Section 01</a>
  </nav>

  <h1>Shapes &amp; <em>Geometry</em></h1>
  <p class="subtitle">A study in rectangular form</p>

  <div class="grid">
    <div class="rect r1"><span class="rect-label">Form 01</span></div>
    <div class="rect r2"><span class="rect-label">Form 02</span></div>
    <div class="rect r3"><span class="rect-label">Form 03</span></div>
    <div class="rect r4"><span class="rect-label">Form 04</span></div>
    <div class="rect r5"><span class="rect-label">Form 05</span></div>
    <div class="rect r6"><span class="rect-label">Form 06</span></div>
    <div class="rect r7"><span class="rect-label">Form 07</span></div>
    <div class="rect r8"><span class="rect-label">Form 08</span></div>
    <div class="rect r9"><span class="rect-label">Form 09</span></div>
    <div class="rect r10"><span class="rect-label">Form 10</span></div>
    <div class="rect r11"><span class="rect-label">Form 11</span></div>
  </div>

</body>
</html>
