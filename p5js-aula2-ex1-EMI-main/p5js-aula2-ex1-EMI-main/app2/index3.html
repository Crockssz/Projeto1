<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Color & Pattern</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #f5f0eb;
      --accent: #ff3c6e;
      --text: #0a0a0a;
      --muted: #aaa;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      padding: 3rem;
    }

    nav {
      margin-bottom: 3rem;
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }

    nav a {
      color: #999;
      text-decoration: none;
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      transition: color 0.2s;
    }

    nav a:hover { color: var(--accent); }
    nav .sep { color: #ccc; font-size: 0.7rem; }

    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3rem, 7vw, 6rem);
      letter-spacing: 0.04em;
      line-height: 0.95;
      margin-bottom: 0.4rem;
    }

    h1 em { color: var(--accent); font-style: normal; }

    .subtitle {
      font-size: 0.8rem;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 4rem;
    }

    /* Masonry-like bento grid */
    .bento {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      grid-template-rows: 180px 130px 150px 120px;
      gap: 10px;
    }

    .tile {
      border-radius: 6px;
      position: relative;
      overflow: hidden;
      transition: transform 0.4s cubic-bezier(0.16,1,0.3,1), box-shadow 0.4s;
      cursor: default;
    }

    .tile:hover {
      transform: translateY(-5px) scale(1.02);
      box-shadow: 0 24px 60px rgba(0,0,0,0.18);
      z-index: 2;
    }

    .tile-label {
      position: absolute;
      bottom: 1rem; left: 1rem;
      font-size: 0.6rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      font-weight: 500;
    }

    /* Row 1 */
    .t1 { grid-column: 1/3; grid-row: 1; background: var(--accent); }
    .t1 .tile-label { color: rgba(255,255,255,0.6); }

    .t2 { grid-column: 3/5; grid-row: 1; background: #0a0a0a; }
    .t2 .tile-label { color: rgba(255,255,255,0.3); }

    .t3 { grid-column: 5/7; grid-row: 1; background: #ffe04a; }
    .t3 .tile-label { color: rgba(0,0,0,0.4); }

    /* Row 2 */
    .t4 { grid-column: 1/2; grid-row: 2; background: #f5f0eb; border: 1px solid #ddd; }
    .t4 .tile-label { color: #bbb; }

    .t5 { grid-column: 2/4; grid-row: 2; background: #ff7b54; }
    .t5 .tile-label { color: rgba(255,255,255,0.6); }

    .t6 { grid-column: 4/7; grid-row: 2; background: #0a0a0a; }
    .t6 .tile-label { color: rgba(255,255,255,0.25); }

    /* Row 3 */
    .t7 { grid-column: 1/4; grid-row: 3; background: #d4efe8; }
    .t7 .tile-label { color: rgba(0,0,0,0.35); }

    .t8 { grid-column: 4/6; grid-row: 3; background: var(--accent); }
    .t8 .tile-label { color: rgba(255,255,255,0.6); }

    .t9 { grid-column: 6/7; grid-row: 3; background: #ffe04a; }
    .t9 .tile-label { color: rgba(0,0,0,0.4); }

    /* Row 4 */
    .t10 { grid-column: 1/2; grid-row: 4; background: #0a0a0a; }
    .t10 .tile-label { color: rgba(255,255,255,0.25); }

    .t11 { grid-column: 2/5; grid-row: 4; background: #f5f0eb; border: 2px solid var(--accent); }
    .t11 .tile-label { color: var(--accent); }

    .t12 { grid-column: 5/7; grid-row: 4; background: #ff3c6e; }
    .t12 .tile-label { color: rgba(255,255,255,0.5); }

    /* Inner decorative elements */
    .t2::after {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      width: 40px; height: 40px;
      background: rgba(255,60,110,0.3);
      border-radius: 50%;
    }

    .t6::before {
      content: '';
      position: absolute;
      right: 1.5rem; top: 50%;
      transform: translateY(-50%);
      width: 36px; height: 36px;
      border: 2px solid rgba(255,224,74,0.25);
      border-radius: 2px;
      rotate: 45deg;
    }

    .t7::after {
      content: '';
      position: absolute;
      right: 2rem; bottom: 1.5rem;
      width: 80px; height: 3px;
      background: rgba(0,0,0,0.12);
    }

    .t11::before {
      content: '→';
      position: absolute;
      right: 1.5rem; top: 50%;
      transform: translateY(-50%);
      color: var(--accent);
      font-size: 1.4rem;
    }

    /* stripe pattern on t4 */
    .t4 {
      background: repeating-linear-gradient(
        45deg,
        #f5f0eb,
        #f5f0eb 4px,
        #eae5e0 4px,
        #eae5e0 8px
      );
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(15px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .tile { animation: fadeIn 0.55s cubic-bezier(0.16,1,0.3,1) both; }
    .t1  { animation-delay: 0.05s; }
    .t2  { animation-delay: 0.1s; }
    .t3  { animation-delay: 0.15s; }
    .t4  { animation-delay: 0.2s; }
    .t5  { animation-delay: 0.25s; }
    .t6  { animation-delay: 0.3s; }
    .t7  { animation-delay: 0.35s; }
    .t8  { animation-delay: 0.4s; }
    .t9  { animation-delay: 0.45s; }
    .t10 { animation-delay: 0.5s; }
    .t11 { animation-delay: 0.55s; }
    .t12 { animation-delay: 0.6s; }
  </style>
</head>
<body>

  <nav>
    <a href="../index.html">← Portal</a>
    <span class="sep">/</span>
    <a href="#">Section 02</a>
  </nav>

  <h1>Color &amp; <em>Pattern</em></h1>
  <p class="subtitle">A vivid bento of color-blocked rectangles</p>

  <div class="bento">
    <div class="tile t1"><span class="tile-label">Vivid 01</span></div>
    <div class="tile t2"><span class="tile-label">Vivid 02</span></div>
    <div class="tile t3"><span class="tile-label">Vivid 03</span></div>
    <div class="tile t4"><span class="tile-label">Vivid 04</span></div>
    <div class="tile t5"><span class="tile-label">Vivid 05</span></div>
    <div class="tile t6"><span class="tile-label">Vivid 06</span></div>
    <div class="tile t7"><span class="tile-label">Vivid 07</span></div>
    <div class="tile t8"><span class="tile-label">Vivid 08</span></div>
    <div class="tile t9"><span class="tile-label">Vivid 09</span></div>
    <div class="tile t10"><span class="tile-label">Vivid 10</span></div>
    <div class="tile t11"><span class="tile-label">Vivid 11</span></div>
    <div class="tile t12"><span class="tile-label">Vivid 12</span></div>
  </div>

</body>
</html>
