<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Projeto 3 – Experiências Imersivas</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --bg:#060610;--surface:#0e0e1c;--border:#1a1a2e;
    --accent:#22c55e;--text:#e0e0f0;--muted:#6060a0;
  }
  html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;overflow-x:hidden}

  nav{display:flex;align-items:center;gap:1rem;padding:2rem 0;margin-bottom:2rem}
  .nav-back{font-family:'Space Mono',monospace;font-size:.7rem;color:var(--muted);text-decoration:none;transition:color .2s}
  .nav-back:hover{color:var(--accent)}
  .nav-sep{color:var(--border)}
  .nav-current{font-family:'Space Mono',monospace;font-size:.7rem;color:var(--accent);text-transform:uppercase;letter-spacing:.1em}

  .wrap{max-width:960px;margin:0 auto;padding:0 2rem}
  
  header{margin-bottom:3rem}
  h1{font-size:clamp(2.2rem,6vw,4rem);font-weight:800;line-height:1.1;margin-bottom:.5rem}
  h1 span{color:var(--accent)}
  .subtitle{font-family:'Space Mono',monospace;font-size:.8rem;color:var(--muted);line-height:1.7}

  .divider{width:100%;height:1px;background:var(--border);margin:2rem 0}

  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:1.5rem;padding-bottom:4rem}

  .card{
    background:var(--surface);border:1px solid var(--border);border-radius:16px;
    padding:2rem;text-decoration:none;color:var(--text);display:block;
    position:relative;overflow:hidden;transition:border-color .25s,transform .25s;
  }
  .card::before{
    content:'';position:absolute;inset:0;
    background:radial-gradient(circle at 80% 20%, #22c55e22 0%, transparent 65%);
    pointer-events:none;
  }
  .card:hover{border-color:var(--accent);transform:translateY(-4px)}

  .card h2{font-size:1.4rem;font-weight:800;margin-bottom:.6rem}
  .card p{font-family:'Space Mono',monospace;font-size:.75rem;color:var(--muted);line-height:1.6;margin-bottom:1.5rem}
  .cta{font-family:'Space Mono',monospace;font-size:.75rem;color:var(--accent);display:flex;align-items:center;gap:.5rem;letter-spacing:.05em}
  .cta::after{content:'↗'}

  footer{border-top:1px solid var(--border);padding:2rem 0;text-align:center;font-family:'Space Mono',monospace;font-size:.7rem;color:var(--muted)}
</style>
</head>
<body>
<div class="wrap">
  <nav>
    <a href="../index.html" class="nav-back">← Voltar</a>
    <span class="nav-sep">/</span>
    <span class="nav-current">Projeto 3</span>
  </nav>

  <header>
    <h1>Experiências <span>Imersivas</span></h1>
    <p class="subtitle">// Realidade Virtual 360º e Realidade Aumentada</p>
  </header>

  <div class="divider"></div>

  <div class="cards">
    <a href="vr360/index.html" class="card">
      <h2>VR 360º</h2>
      <p>Cenário panorâmico imersivo com navegação por hotspots.</p>
      <div class="cta">Entrar</div>
    </a>

    <a href="realidade/index.html" class="card">
      <h2>AR Marcador</h2>
      <p>Experiência de realidade aumentada com marcador personalizado.</p>
      <div class="cta">Entrar</div>
    </a>
  </div>
</div>

<footer>
  <div class="wrap">Projeto 3 · ISTEC 2024/25</div>
</footer>

</body>
</html>
