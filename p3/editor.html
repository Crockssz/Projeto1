<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PIXLR — Image Editor</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet" />
</head>
<body class="editor-page">

  <div class="editor-container">
    <!-- Header -->
    <header class="editor-header">
      <div class="header-left">
        <a href="index.html" class="btn-back">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <path d="M15 10H5M5 10L10 15M5 10L10 5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
          <span>Back</span>
        </a>
        <div class="logo-mini">PIXLR<span class="accent">_</span></div>
      </div>
      <div class="header-right">
        <button id="downloadBtn" class="btn-download" disabled>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <path d="M12 2v12M12 14l-4-4M12 14l4-4M2 20h20" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
          Download
        </button>
      </div>
    </header>

    <main class="editor-main">
      <!-- Canvas Area -->
      <div class="canvas-section">
        <div class="canvas-wrapper" id="canvasWrapper">
          <canvas id="canvas"></canvas>
          <div class="canvas-placeholder" id="placeholder">
            <div class="placeholder-content">
              <div class="placeholder-icon">📸</div>
              <h2>Upload an Image</h2>
              <p>Drag and drop or click to select</p>
              <label class="btn-upload">
                <input type="file" id="imageInput" accept="image/*" style="display: none;" />
                Choose Image
              </label>
            </div>
          </div>
        </div>
      </div>

      <!-- Controls Panel -->
      <div class="controls-section">
        <div class="controls-header">
          <h3>EFFECTS</h3>
        </div>

        <!-- Upload Area -->
        <div class="control-group upload-area">
          <label for="imageInput" class="btn-upload-large">
            <input type="file" id="imageInput2" accept="image/*" style="display: none;" />
            <span>📁 Change Image</span>
          </label>
        </div>

        <!-- Saturation -->
        <div class="control-group">
          <div class="control-header">
            <label>Saturation</label>
            <span class="control-value" id="saturationVal">100%</span>
          </div>
          <input type="range" id="saturation" min="0" max="200" value="100" class="slider" />
        </div>

        <!-- Brightness -->
        <div class="control-group">
          <div class="control-header">
            <label>Brightness</label>
            <span class="control-value" id="brightnessVal">100%</span>
          </div>
          <input type="range" id="brightness" min="0" max="200" value="100" class="slider" />
        </div>

        <!-- Contrast -->
        <div class="control-group">
          <div class="control-header">
            <label>Contrast</label>
            <span class="control-value" id="contrastVal">100%</span>
          </div>
          <input type="range" id="contrast" min="0" max="200" value="100" class="slider" />
        </div>

        <!-- Blur -->
        <div class="control-group">
          <div class="control-header">
            <label>Blur</label>
            <span class="control-value" id="blurVal">0px</span>
          </div>
          <input type="range" id="blur" min="0" max="50" value="0" class="slider" />
        </div>

        <!-- Hue Shift -->
        <div class="control-group">
          <div class="control-header">
            <label>Hue Shift</label>
            <span class="control-value" id="hueVal">0°</span>
          </div>
          <input type="range" id="hue" min="0" max="360" value="0" class="slider" />
        </div>

        <!-- Distortion -->
        <div class="control-group">
          <div class="control-header">
            <label>Distortion</label>
            <span class="control-value" id="distortionVal">0%</span>
          </div>
          <input type="range" id="distortion" min="0" max="100" value="0" class="slider" />
        </div>

        <!-- Invert -->
        <div class="control-group">
          <div class="control-header">
            <label>Invert</label>
            <span class="control-value" id="invertVal">0%</span>
          </div>
          <input type="range" id="invert" min="0" max="100" value="0" class="slider" />
        </div>

        <!-- Buttons -->
        <div class="control-group buttons">
          <button id="resetBtn" class="btn-secondary">Reset All</button>
          <button id="previewBtn" class="btn-secondary">Preview</button>
        </div>
      </div>
    </main>
  </div>

  <script src="editor.js"></script>

</body>
</html>
