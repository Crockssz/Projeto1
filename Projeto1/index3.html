<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Projeto 2 – Portais Visuais</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
  :root{--bg:#0a0a0a;--accent-a:#e8ff47;--accent-b:#ff3c6e;--text:#f0f0f0;--muted:#555}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column;padding:2rem}

  nav{display:flex;align-items:center;gap:1rem;margin-bottom:2rem}
  .nav-back{color:var(--muted);text-decoration:none;font-size:.75rem;letter-spacing:.1em;text-transform:uppercase;transition:color .2s}
  .nav-back:hover{color:var(--text)}
  .nav-sep{color:var(--muted)}
  .nav-current{font-size:.75rem;color:var(--accent-a);letter-spacing:.1em;text-transform:uppercase}

  header{margin-bottom:3rem}
  h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(2rem,6vw,4rem);letter-spacing:.04em;line-height:1.05;margin-bottom:.4rem}
  .subtitle{font-size:.8rem;color:var(--muted);letter-spacing:.12em;text-transform:uppercase}

  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:1.5rem;flex:1}

  .card{
    background:linear-gradient(135deg,#111 0%,#1a1a0d 100%);border:1px solid #1e1e1e;
    border-radius:12px;padding:2rem;text-decoration:none;color:var(--text);
    position:relative;overflow:hidden;transition:all .3s;cursor:pointer;
  }
  .card:hover{border-color:var(--accent-a);transform:translateY(-6px)}

  .card-num{font-family:'Bebas Neue',sans-serif;font-size:3.5rem;opacity:.08;margin-bottom:1rem}
  .card h2{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;letter-spacing:.02em;margin-bottom:.6rem}
  .card p{font-size:.8rem;color:var(--muted);line-height:1.6;margin-bottom:1.5rem}
  .cta{font-size:.75rem;color:var(--accent-a);text-transform:uppercase;letter-spacing:.1em;display:flex;align-items:center;gap:.5rem}
  .cta::after{content:'↗'}

  footer{border-top:1px solid #1e1e1e;padding:2rem 0;text-align:center;font-size:.75rem;color:var(--muted);margin-top:3rem}
</style>
</head>
<body>

  <nav>
    <a href="../index.html" class="nav-back">← Voltar</a>
    <span class="nav-sep">/</span>
    <span class="nav-current">Projeto 1</span>
  </nav>

  <header>
    <h1>Portais Visuais</h1>
    <p class="subtitle">// Geometria, Cor e Interação</p>
  </header>

  <div class="cards">
    <a href="ShapesPortal/index.html" class="card">
      <div class="card-num">01</div>
      <h2>Shapes & Geometry</h2>
      <p>Exploração de formas geométricas com múltiplas interações visuais.</p>
      <div class="cta">Entrar</div>
    </a>

    <a href="typewriter/index.html" class="card">
      <div class="card-num">02</div>
      <h2>Colorful Typewriter</h2>
      <p>Experiência tipográfica imersiva com animações de entrada dinâmicas.</p>
      <div class="cta">Entrar</div>
    </a>
  </div>

  <footer>Projeto 2 · ISTEC 2024/25</footer>

</body>
</html>
